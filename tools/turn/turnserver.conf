# coturn config for BhatBall Online Rooms — TURN relay for WebRTC.
# Covers the hard cases STUN can't (symmetric NAT, school/corporate wifi,
# cellular). Install with tools/turn/setup-coturn.sh, which fills the two
# placeholders (__PUBLIC_IP__, __TURN_PASSWORD__) and installs this to
# /etc/turnserver.conf.

# --- listeners ---------------------------------------------------------------
listening-port=3478
# TLS (optional but recommended so port 443 works through strict firewalls).
# Requires certs; leave commented until you have them.
# tls-listening-port=5349
# cert=/etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
# pkey=/etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem

# Bind to all interfaces; advertise the public IP for relay candidates.
# On a cloud VM the box usually has a private IP, so external-ip maps it.
external-ip=__PUBLIC_IP__

# --- authentication (static long-term credential) ----------------------------
# The username/password are visible in the game's client JS — that's expected
# for a hobby relay. Keep the relay cheap to abuse by capping bandwidth below.
lt-cred-mech
user=bhatball:__TURN_PASSWORD__
realm=bhatball

# --- relay port range (open these in the firewall too) -----------------------
min-port=49152
max-port=65535

# --- hardening / limits ------------------------------------------------------
fingerprint
no-cli
no-tlsv1
no-tlsv1_1
# Refuse to relay to private/loopback/multicast ranges (anti-SSRF).
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
# Bandwidth guard rails (bytes/sec per session, and total quota).
max-bps=1000000
total-quota=1200

# --- logging -----------------------------------------------------------------
log-file=/var/log/turnserver/turnserver.log
simple-log
