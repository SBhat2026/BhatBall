name = "bhatball-ai-proxy"
main = "worker.js"
compatibility_date = "2026-01-01"

# Lock the proxy to your own site(s) so nobody else can spend your Gemini quota.
# Comma-separated origins (no trailing slash/path). Use "*" only for quick tests.
[vars]
ALLOWED_ORIGIN = "https://sbhat2026.github.io,http://localhost:8009"

# GEMINI_API_KEY is a SECRET — never put it here. Set it once with:
#   wrangler secret put GEMINI_API_KEY

# Per-IP rate limit (Cloudflare's built-in Rate Limiting binding). Avatar
# generation is a once-per-player action, so a few per minute is plenty for
# legit play but stops one client from draining your Gemini quota. `period`
# only accepts 10 or 60 (seconds); the limit is counted per Cloudflare location.
# namespace_id is any integer unique within your account.
[[unsafe.bindings]]
name = "AVATAR_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 6, period = 60 }

# Global spend guard: a second limiter keyed on a CONSTANT (not IP), so it caps
# TOTAL Gemini calls across everyone — the belt to the per-IP suspenders. A
# distributed flood from many IPs slips past AVATAR_LIMIT but not this. Sized
# for a busy public game; raise if you legitimately need more throughput.
# (Counted per Cloudflare location; the WAF rule in waf-ratelimit.sh adds an
# edge-level cap in front for true account-wide DDoS protection.)
[[unsafe.bindings]]
name = "GLOBAL_LIMIT"
type = "ratelimit"
namespace_id = "1002"
simple = { limit = 120, period = 60 }
